name: Mirror to Codeberg

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  mirror:
    name: Mirror to Codeberg
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push mirror to Codeberg
        env:
          SSH_PRIVATE_KEY: ${{ secrets.CODEBERG_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan codeberg.org >> ~/.ssh/known_hosts
          git remote add codeberg ssh://git@codeberg.org/karakTaka/netatmo-exporter.git
          git push --force codeberg HEAD:main
          git push --force --tags codeberg
